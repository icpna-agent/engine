name: CI/CD Engine

on:
  # Valida los Pull Requests dirigidos a main.
  pull_request:
    branches:
      - main

  # Valida los push realizados a main y develop.
  push:
    branches:
      - main
      - develop

  # Permite ejecutar el workflow manualmente.
  workflow_dispatch:

# GitHub Actions solamente necesita leer el repositorio.
permissions:
  contents: read

# Si llegan varios commits seguidos a la misma rama,
# cancela la ejecución anterior.
concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 1. VALIDACIÓN
  # =========================================================
  validate:
    name: Test, build and validate Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Aquí se ejecutan las pruebas unitarias desarrolladas con BDD y TDD.
      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run BDD tests
        run: npm run test:bdd

      - name: Build NestJS application
        run: npm run build

      # No publica la imagen.
      # Solo comprueba que el Dockerfile pueda construirse correctamente.
      - name: Validate Docker image
        run: docker build -t erixcel-engine:${{ github.sha }} .

  # =========================================================
  # 2. DEPLOY
  # =========================================================
  deploy:
    name: Deploy to Easypanel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Este job espera que validate termine correctamente.
    needs:
      - validate

    # Solo despliega:
    # - desde la rama main;
    # - después de un push o ejecución manual;
    # - nunca desde un Pull Request ni desde develop.
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    env:
      EASYPANEL_DEPLOY_WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}

    steps:
      - name: Validate Easypanel webhook
        shell: bash
        run: |
          if [ -z "${EASYPANEL_DEPLOY_WEBHOOK:-}" ]; then
            echo "Missing GitHub secret: EASYPANEL_DEPLOY_WEBHOOK"
            echo "Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger Easypanel deployment
        shell: bash
        run: |
          RESPONSE=$(curl \
            --fail-with-body \
            --show-error \
            --silent \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 10 \
            --max-time 60 \
            "$EASYPANEL_DEPLOY_WEBHOOK"
          )

          echo "$RESPONSE"
          echo "Easypanel deployment triggered successfully."