name: CI/CD Engine

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - develop

  workflow_dispatch:

# El workflow solamente necesita leer el repositorio.
permissions:
  contents: read

concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, build and validate Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Build NestJS application
        run: npm run build

      - name: Validate Docker image
        run: docker build -t erixcel-engine:${{ github.sha }} .

  deploy:
    name: Deploy to Easypanel
    runs-on: ubuntu-latest
    needs:
      - validate

    # Despliega únicamente desde main.
    # No despliega desde pull requests ni desde develop.
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    env:
      EASYPANEL_DEPLOY_WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}

    steps:
      - name: Validate Easypanel webhook
        shell: bash
        run: |
          if [ -z "${EASYPANEL_DEPLOY_WEBHOOK:-}" ]; then
            echo "Missing GitHub secret: EASYPANEL_DEPLOY_WEBHOOK"
            echo "Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger Easypanel deployment
        shell: bash
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            --retry 3 \
            --retry-delay 2 \
            --max-time 60 \
            "$EASYPANEL_DEPLOY_WEBHOOK"

          echo "Easypanel deployment triggered successfully."