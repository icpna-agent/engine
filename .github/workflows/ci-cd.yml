name: CI/CD Engine

on:
  # Valida los Pull Requests dirigidos a main.
  pull_request:
    branches:
      - main

  # Valida los push realizados a main y develop.
  push:
    branches:
      - main
      - develop

  # Permite ejecutar el workflow manualmente.
  workflow_dispatch:

# GitHub Actions solamente necesita leer el repositorio.
permissions:
  contents: read

# Si llegan varios commits seguidos a la misma rama,
# cancela la ejecución anterior.
concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 1. VALIDACIÓN
  # =========================================================
  validate:
    name: Test, build and validate Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_VERSION: version_002
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: erixcel_engine_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: erixcel_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d erixcel_engine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database
        run: npm run db:create

      - name: Seed test database
        run: npm run db:seed

      # Aquí se ejecutan las pruebas unitarias desarrolladas con BDD y TDD.
      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run BDD tests
        run: npm run test:bdd

      - name: Generate Allure report
        if: always()
        run: npm run report:allure

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Build NestJS application
        run: npm run build

      # No publica la imagen.
      # Solo comprueba que el Dockerfile pueda construirse correctamente.
      - name: Validate Docker image
        run: docker build -t erixcel-engine:${{ github.sha }} .

  # =========================================================
  # 2. DEPLOY
  # =========================================================
  deploy:
    name: Deploy to Easypanel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Este job espera que validate termine correctamente.
    needs:
      - validate

    # Solo despliega:
    # - desde la rama main;
    # - después de un push o ejecución manual;
    # - nunca desde un Pull Request ni desde develop.
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    env:
      EASYPANEL_DEPLOY_WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}

    steps:
      - name: Validate Easypanel webhook
        shell: bash
        run: |
          if [ -z "${EASYPANEL_DEPLOY_WEBHOOK:-}" ]; then
            echo "Missing GitHub secret: EASYPANEL_DEPLOY_WEBHOOK"
            echo "Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Trigger Easypanel deployment
        shell: bash
        run: |
          RESPONSE=$(curl \
            --fail-with-body \
            --show-error \
            --silent \
            --location \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --connect-timeout 10 \
            --max-time 60 \
            "$EASYPANEL_DEPLOY_WEBHOOK"
          )

          echo "$RESPONSE"
          echo "Easypanel deployment triggered successfully."
