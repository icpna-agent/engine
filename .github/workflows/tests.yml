name: Engine tests

on:
  # Valida los Pull Requests dirigidos a main.
  pull_request:
    branches:
      - main

  # Valida los push realizados a main y develop.
  push:
    branches:
      - main
      - develop

  # Permite ejecutar el workflow manualmente.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Si llegan varios commits seguidos a la misma rama,
# cancela la ejecución anterior.
concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 1. PRUEBAS
  # =========================================================
  validate:
    name: Run test suites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_VERSION: version_002
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: erixcel_engine_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: erixcel_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d erixcel_engine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test database
        run: npm run db:create

      - name: Seed test database
        run: npm run db:seed

      # Aquí se ejecutan las pruebas unitarias desarrolladas con BDD y TDD.
      - name: Run unit tests
        run: npm test -- --runInBand --passWithNoTests

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run BDD tests
        run: npm run test:bdd

      - name: Generate Allure report
        if: always()
        run: npm run report:allure

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Configure GitHub Pages
        if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: actions/configure-pages@v5

      - name: Upload Allure report to GitHub Pages
        if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  # =========================================================
  # 2. PUBLICAR REPORTE ALLURE
  # =========================================================
  publish-allure-report:
    name: Publish Allure report to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - validate

    # Publica el reporte visual solo desde main.
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
